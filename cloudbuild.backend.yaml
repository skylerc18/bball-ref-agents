steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bball-ai-ref-agents:$COMMIT_SHA
      - .
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bball-ai-ref-agents
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bball-ai-ref-agents:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bball-ai-ref-agents:$COMMIT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
