steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=https://bball-ai-ref-agents-f4ayqerdwq-ew.a.run.app
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bball-ai-ref-frontend:$COMMIT_SHA
      - .
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bball-ai-ref-frontend
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bball-ai-ref-frontend:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bball-ai-ref-frontend:$COMMIT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
